<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Student Portal</title>
    <style>
        /* Copy full CSS from dashboard */
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #1f2937;
            --light-color: #f8fafc;
            --text-dark: #111827;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background-color: var(--light-color); color: var(--text-dark); line-height: 1.6; }
        .container { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: white; box-shadow: var(--shadow); padding: 1.5rem 0; }
        .sidebar h2 { color: var(--primary-color); padding: 0 1.5rem 1rem; font-size: 1.25rem; border-bottom: 1px solid var(--border-color); margin-bottom: 1rem; }
        .nav-item { display: flex; align-items: center; padding: 0.75rem 1.5rem; color: var(--text-light); text-decoration: none; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { background-color: var(--primary-color); color: white; }
        .nav-icon { margin-right: 0.75rem; }
        .main { flex: 1; padding: 2rem; max-width: 1200px; }
        .profile-card { background: white; padding: 2rem; border-radius: 0.5rem; box-shadow: var(--shadow); }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.375rem; font-size: 1rem; }
        .btn { background: var(--primary-color); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        .btn:hover { background: var(--secondary-color); }
        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { display: flex; white-space: nowrap; max-height: 60px; overflow-x: auto; } .main { padding: 1rem; } }
        body.dark { --light-color: #111827; --text-dark: #f9fafb; --text-light: #9ca3af; --border-color: #374151; }
        body.dark .profile-card { background-color: #1f2937; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Student Portal</h2>
            <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
            <a href="login.html" class="nav-item"><span class="nav-icon">🔐</span>Login</a>
            <a href="dashboard/dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
            <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span>Profile</a>
            <a href="contact.html" class="nav-item"><span class="nav-icon">📞</span>Contact</a>
        </nav>
        <main class="main">
            <div class="profile-card">
                <div class="avatar">MA</div>
                <h1>Mharc Angelo S. Cardenas</h1>
                <p>Computer Science Student</p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" value="mharc@example.com" readonly>
                </div>
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" value="2023001" readonly>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" value="+1 (555) 123-4567" readonly>
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea readonly>Aspiring software engineer passionate about web development and data science.</textarea>
                </div>
                <button class="btn" onclick="editProfile()">Edit Profile</button>
                <button class="btn" style="background: var(--danger-color);" onclick="changePassword()">Change Password</button>
            </div>
        </main>
    </div>
    <script>
        function editProfile() { alert('Edit mode activated! (Mock)'); }
        function changePassword() { alert('Password change initiated (Mock)'); }
        // Dark mode toggle if needed
    </script>
</body>
</html>
