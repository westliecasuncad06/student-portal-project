<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Portal</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #1f2937;
            --light-color: #f8fafc;
            --text-dark: #111827;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--light-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: white;
            box-shadow: var(--shadow);
            padding: 1.5rem 0;
        }

        .sidebar h2 {
            color: var(--primary-color);
            padding: 0 1.5rem 1rem;
            font-size: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--primary-color);
            color: white;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 0.75rem;
            opacity: 0.8;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .user-info h1 {
            font-size: 1.875rem;
            margin-bottom: 0.25rem;
        }

        .user-role {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .dark-toggle {
            background: none;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dark-toggle:hover {
            background-color: var(--light-color);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.875rem;
        }

        /* Courses & Activity */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .section {
            background: white;
            border-radius: 0.5rem;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .filter-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .courses-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .course-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-item:last-child {
            border-bottom: none;
        }

        .course-info h4 {
            margin-bottom: 0.25rem;
        }

        .course-grade {
            font-weight: bold;
            font-size: 1.125rem;
        }

        .grade-a { color: var(--success-color); }
        .grade-b { color: var(--warning-color); }
        .grade-c { color: var(--danger-color); }

        /* Recent Activity */
        .activity-list {
            padding: 1.5rem;
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 60px;
                overflow-x: auto;
                white-space: nowrap;
                display: flex;
            }

            .main {
                padding: 1rem;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        body.dark {
            --light-color: #111827;
            --text-dark: #f9fafb;
            --text-light: #9ca3af;
            --border-color: #374151;
        }

        body.dark .section,
        body.dark .stat-card,
        body.dark .sidebar {
            background-color: #1f2937;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <h2>Student Portal</h2>
            <a href="../index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                Home
            </a>
            <a href="../login.html" class="nav-item">
                <span class="nav-icon">🔐</span>
                Login
            </a>
            <a href="dashboard.html" class="nav-item active">
                <span class="nav-icon">📊</span>
                Dashboard
            </a>
            <a href="../profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                Profile
            </a>
            <a href="../contact.html" class="nav-item">
                <span class="nav-icon">📞</span>
                Contact
            </a>
        </nav>

        <main class="main">
            <!-- Header -->
            <div class="header">
                <div class="user-info">
                    <h1>Welcome back, John Doe</h1>
                    <p class="user-role">Computer Science Student</p>
                </div>
                <button class="dark-toggle" onclick="toggleDarkMode()">
                    🌙 Dark Mode
                </button>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value">3.75</div>
                    <div class="stat-label">GPA</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">14</div>
                    <div class="stat-label">Credits Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">87%</div>
                    <div class="stat-label">Attendance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">2</div>
                    <div class="stat-label">Pending Assignments</div>
                </div>
            </div>

            <!-- Content Grid -->
            <div class="content-grid">
                <div>
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">Current Courses</div>
                            <button class="filter-btn" onclick="filterCourses('all')">All</button>
                            <button class="filter-btn" onclick="filterCourses('A')">A</button>
                        </div>
                        <div class="courses-list" id="coursesList">
                            <!-- Courses populated by JS -->
                        </div>
                    </div>
                </div>

                <div>
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">Recent Activity</div>
                        </div>
                        <div class="activity-list">
                            <!-- Activity populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Mock Data
        const courses = [
            { name: 'Web Development', grade: 'A', credits: 3 },
            { name: 'Data Structures', grade: 'A-', credits: 4 },
            { name: 'Algorithms', grade: 'B+', credits: 3 },
            { name: 'Database Systems', grade: 'B', credits: 3 },
            { name: 'Software Engineering', grade: 'A', credits: 3 }
        ];

        const activities = [
            { icon: '✓', text: 'Assignment 3.2 submitted', time: '2 hours ago' },
            { icon: '📖', text: 'Completed Quiz: Midterm Review', time: '1 day ago' },
            { icon: '📧', text: 'New message from Prof. Smith', time: '2 days ago' },
            { icon: '📊', text: 'Grades updated for Data Structures', time: '3 days ago' }
        ];

        // Initialize
        function init() {
            renderCourses();
            renderActivities();
        }

        function renderCourses() {
            const list = document.getElementById('coursesList');
            list.innerHTML = courses.map(course => 
                `<div class="course-item">
                    <div class="course-info">
                        <h4>${course.name}</h4>
                        <p>${course.credits} credits</p>
                    </div>
                    <div class="course-grade grade-${course.grade.charAt(0)}">${course.grade}</div>
                </div>`
            ).join('');
        }

        function renderActivities() {
            const list = document.querySelector('.activity-list');
            list.innerHTML = activities.map(activity => 
                `<div class="activity-item">
                    <div class="activity-icon">${activity.icon}</div>
                    <div>
                        <div>${activity.text}</div>
                        <small style="color: var(--text-light);">${activity.time}</small>
                    </div>
                </div>`
            ).join('');
        }

        function filterCourses(grade) {
            const filtered = grade === 'all' ? courses : courses.filter(c => c.grade.charAt(0) === grade);
            const list = document.getElementById('coursesList');
            list.innerHTML = filtered.map(course => 
                `<div class="course-item">
                    <div class="course-info">
                        <h4>${course.name}</h4>
                        <p>${course.credits} credits</p>
                    </div>
                    <div class="course-grade grade-${course.grade.charAt(0)}">${course.grade}</div>
                </div>`
            ).join('');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.dark-toggle');
            btn.textContent = document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        // Load on start
        init();
    </script>
</body>
</html>
